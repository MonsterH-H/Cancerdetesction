[server]
port = 8501
address = "localhost"
baseUrlPath = ""
headless = true
enableCORS = false
enableXsrfProtection = false
folderWatchBlacklist = [".git", "venv", "data"]

[browser]
gatherUsageStats = false
serverAddress = "localhost"
serverPort = 8501

[theme]
primaryColor = "#0d9488"
backgroundColor = "#f8fafc"
secondaryBackgroundColor = "#ffffff"
textColor = "#0f172a"
font = "sans serif"

[logger]
level = "info"

